name: edge-health-smoke

on:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "50 2 * * *"

jobs:
  edge-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check edge runtime structure
        run: |
          test -f wrangler.jsonc
          test -d src
          test -d src/agents
          test -d src/integrations
          test -d src/lib

      - name: Check manifests
        run: |
          test -f manifests/repo-identity.yaml
          test -f manifests/repo-boundary.yaml
          test -f docs/processes/edge-role.md
