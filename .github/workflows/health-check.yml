    - name: Health Check
      run: |
        set -x
        response=$(curl -s -o /dev/null -w "%{http_code}" https://cimeika-backend.workers.dev/api/health)
        curl_exit=$?
        if [ $curl_exit -ne 0 ]; then
          echo "❌ curl failed with exit code: $curl_exit"
          curl -v https://cimeika-backend.workers.dev/api/health
          exit 2
        fi
        if [ "$response" = "200" ]; then
          echo "✅ Health check passed"
        else
          echo "❌ Health check failed with status: $response"
          exit 1
        fi
